<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your shopping cart on ShopLite." />
  <title>Cart · ShopLite</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand sl-brand" href="index.html">Shop<span class="sl-brand-dot">Lite</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
          aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item">
              <a class="nav-link sl-cart-link active" href="cart.html" aria-label="View cart">
                <i class="bi bi-cart3"></i>
                <span class="sl-cart-badge" data-cart-badge aria-label="items in cart">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <h1 class="h3 mb-4">Your cart</h1>

    <div class="row g-4">
      <!-- Items -->
      <div class="col-lg-8">
        <ul id="cart-list" class="list-unstyled d-flex flex-column gap-3 m-0" aria-live="polite"></ul>

        <!-- Empty state -->
        <div id="cart-empty" class="sl-state" hidden>
          <i class="bi bi-cart-x"></i>
          <p>Your cart is empty.</p>
          <a href="index.html" class="btn btn-primary">Start shopping</a>
        </div>
      </div>

      <!-- Summary -->
      <aside class="col-lg-4">
        <div id="cart-summary" class="sl-summary" hidden>
          <h2 class="h5 mb-3">Order summary</h2>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Shipping</span>
            <span class="text-success">Free</span>
          </div>
          <hr />
          <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
            <span>Total</span>
            <span id="cart-total">$0.00</span>
          </div>
          <button id="checkout-btn" class="btn btn-primary w-100 mb-2">
            <i class="bi bi-bag-check"></i> Checkout
          </button>
          <button id="clear-cart" class="btn btn-outline-danger w-100">
            <i class="bi bi-trash"></i> Empty cart
          </button>
        </div>
      </aside>
    </div>
  </main>

  <footer class="sl-footer">
    <div class="container d-flex flex-wrap justify-content-between gap-3">
      <div>
        <div class="sl-brand text-white">Shop<span class="sl-brand-dot">Lite</span></div>
        <small>A front-end learning project · Fake Store API</small>
      </div>
      <nav aria-label="Footer">
        <a href="index.html" class="me-3">Home</a>
        <a href="cart.html" class="me-3">Cart</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
