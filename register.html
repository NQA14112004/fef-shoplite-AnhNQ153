<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a ShopLite account." />
  <title>Register · ShopLite</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand sl-brand" href="index.html">Shop<span class="sl-brand-dot">Lite</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
          aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="register.html">Register</a></li>
            <li class="nav-item">
              <a class="nav-link sl-cart-link" href="cart.html" aria-label="View cart">
                <i class="bi bi-cart3"></i>
                <span class="sl-cart-badge" data-cart-badge aria-label="items in cart">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-xl-6">
        <div class="sl-form-card">
          <h1 class="h3 mb-1">Create your account</h1>
          <p class="text-muted mb-4">Join ShopLite — it only takes a minute.</p>

          <!-- novalidate: validation is handled in JavaScript -->
          <form id="register-form" novalidate>
            <div class="mb-3">
              <label for="fullName" class="form-label">Full name</label>
              <input type="text" class="form-control" id="fullName" name="fullName" autocomplete="name" />
              <span class="field-error" data-error-for="fullName"></span>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" autocomplete="email" />
              <span class="field-error" data-error-for="email"></span>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" />
              <span class="field-error" data-error-for="password"></span>
            </div>

            <div class="mb-3">
              <label for="phone" class="form-label">Phone number</label>
              <input type="tel" class="form-control" id="phone" name="phone" autocomplete="tel" />
              <span class="field-error" data-error-for="phone"></span>
            </div>

            <div class="mb-3">
              <label for="country" class="form-label">Country</label>
              <select class="form-select" id="country" name="country">
                <option value="">Choose…</option>
                <option value="VN">Vietnam</option>
                <option value="US">United States</option>
                <option value="JP">Japan</option>
                <option value="UK">United Kingdom</option>
                <option value="OTHER">Other</option>
              </select>
              <span class="field-error" data-error-for="country"></span>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="terms" name="terms" />
              <label class="form-check-label" for="terms">I agree to the terms and conditions</label>
              <span class="field-error" data-error-for="terms"></span>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-person-plus"></i> Create account
            </button>

            <div id="form-success" class="alert alert-success mt-3 mb-0" role="alert" hidden></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="sl-footer">
    <div class="container d-flex flex-wrap justify-content-between gap-3">
      <div>
        <div class="sl-brand text-white">Shop<span class="sl-brand-dot">Lite</span></div>
        <small>A front-end learning project · Fake Store API</small>
      </div>
      <nav aria-label="Footer">
        <a href="index.html" class="me-3">Home</a>
        <a href="cart.html" class="me-3">Cart</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
